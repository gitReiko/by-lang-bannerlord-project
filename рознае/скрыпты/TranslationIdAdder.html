<!DOCTYPE html>
<html lang="be">
<head>
    <meta charset="UTF-8">
    <title>XML Converter</title>
</head>
<body>

<h2>Загрузка XML файла / XML File Upload</h2>
<input type="file" id="fileInput" accept=".xml">
<button onclick="processXML()">Апрацаваць / Process</button>

<h3>Вынік:</h3>
<textarea id="output" style="width:100%; height:300px;"></textarea><br>
<button onclick="downloadXML()">Спампаваць / Download</button>

<script>
function processXML() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) {
        alert("Выберы файл!");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(e.target.result, "text/xml");

        const allElements = xmlDoc.getElementsByTagName("*");
        let items = [];

        for (let el of allElements) {
            if (el.hasAttribute("id") && el.hasAttribute("name")) {
                const id = el.getAttribute("id");
                const name = el.getAttribute("name");
                items.push({ id, name });
            }
        }

        let result = `<?xml version="1.0" encoding="utf-8"?>\n<Items>\n\n`;

        items.forEach(item => {
            result += `  <Item id="${item.id}" name="{=${item.id}.name}${item.name}">\n`;
            result += `  </Item>\n`;
        });

        result += `\n</Items>`;

        document.getElementById("output").value = result;
    };

    reader.readAsText(file);
}

function downloadXML() {
    const content = document.getElementById("output").value;
    const blob = new Blob([content], { type: "application/xml" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "converted.xml";
    a.click();

    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
