<!DOCTYPE html>
<html lang="be">
<head>
<meta charset="UTF-8">
<title>XML → Пераклад (экстрактар)</title>
<style>
body { font-family: Arial; margin: 20px; }
textarea { width: 100%; height: 220px; margin-top: 10px; }
button { margin-top: 10px; padding: 8px 12px; }
#problems { color: red; white-space: pre-wrap; margin-top: 10px; }
</style>
</head>
<body>

<h2>Загрузка XML файла</h2>
<input type="file" id="fileInput" accept=".xml">

<h3>Выніковы XML</h3>
<textarea id="output"></textarea>

<button onclick="download()">Спампаваць XML</button>

<h3>Праблемы (дублікаты)</h3>
<div id="problems"></div>

<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        processXML(e.target.result);
    };
    reader.readAsText(file);
});

function escapeXML(str) {
    return str
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

function cleanText(text) {
    if (text.includes(',')) {
        text = text.split(',')[0];
    }
    return text.trim();
}

function processXML(xmlText) {
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, "text/xml");

    const counts = {};
    const data = {};

    const elements = xmlDoc.getElementsByTagName("*");

    for (let el of elements) {
        for (let attr of el.attributes) {

            const value = attr.value;

            if (value.includes("{=")) {
                const match = value.match(/\{=([^}]+)\}(.*)/);

                if (!match) continue;

                const id = match[1];
                let text = match[2] || "";

                text = cleanText(text);

                if (!counts[id]) counts[id] = 0;
                counts[id]++;

                if (!data[id]) {
                    data[id] = text;
                }
            }
        }
    }

    let result = `<?xml version="1.0" encoding="UTF-8"?>\n`;
    result += `<base xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" `;
    result += `xmlns:xsd="http://www.w3.org/2001/XMLSchema" type="string">\n`;
    result += ` <strings>\n`;

    for (let id in data) {
        const safeText = escapeXML(data[id]);
        result += `  <string id="${id}" text="${safeText}"/>\n`;
    }

    result += ` </strings>\n</base>`;

    document.getElementById('output').value = result;

    let problems = "";
    for (let id in counts) {
        if (counts[id] > 1) {
            problems += `ID "${id}" паўтараецца: ${counts[id]} раз(ы)\n`;
        }
    }

    document.getElementById('problems').textContent =
        problems || "Праблем не знойдзена";
}

function download() {
    const text = document.getElementById('output').value;
    const blob = new Blob([text], { type: "text/xml" });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "translations.xml";
    a.click();
}
</script>

</body>
</html>
